version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vectorvalley_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vv_password}
      POSTGRES_DB: ${POSTGRES_DB:-vectorvalley}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vectorvalley_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectorvalley_backend
    restart: always
    ports:
      - "127.0.0.1:6000:6000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vv_user}:${POSTGRES_PASSWORD:-vv_password}@db:5432/${POSTGRES_DB:-vectorvalley}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_KEY=${OPENAI_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - EMBEDDING_CACHE_PATH=/app/data/embedding_cache.db
    volumes:
      - embedding_cache:/app/data
      - logs:/app/logs

volumes:
  pgdata:
  redisdata:
  embedding_cache:
  logs:
